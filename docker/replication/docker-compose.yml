version: '3.8'

# Streaming replication setup: primary (port 5432) + replica (port 5433)
#
# Start:   docker compose up -d
# Connect: pgdba-cli --host=localhost --port=5432 --user=postgres --password=postgres --dbname=testdb --sslmode=disable
# MCP:     pgdba-cli --mcp --url "postgres://postgres:postgres@localhost:5432/testdb?sslmode=disable"
#
# The replica starts automatically via pg_basebackup. Allow ~10 seconds for initial sync.
# Both instances share the same credentials (postgres/postgres).

services:
  postgres-primary:
    image: postgres:15
    container_name: pgdba_primary
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./primary-init.sh:/docker-entrypoint-initdb.d/01-init.sh
    command: >
      postgres
        -c wal_level=logical
        -c max_wal_senders=10
        -c max_replication_slots=10
        -c hot_standby=on
        -c wal_log_hints=on
        -c shared_preload_libraries=pg_stat_statements
        -c wal_keep_size=256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-replica:
    image: postgres:15
    container_name: pgdba_replica
    environment:
      POSTGRES_PASSWORD: postgres
      PGPASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./replica-setup.sh:/replica-setup.sh
    depends_on:
      postgres-primary:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/replica-setup.sh"]

volumes:
  primary_data:
  replica_data:
