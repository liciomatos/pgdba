name: PostgreSQL Compatibility Matrix

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg-version: ['13', '14', '15', '16', '17', '18']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        working-directory: pgdba-cli
        run: go mod tidy

      - name: Run full test suite against PostgreSQL ${{ matrix.pg-version }}
        working-directory: pgdba-cli
        env:
          PGDBA_TEST_PG_VERSION: ${{ matrix.pg-version }}-alpine
        run: go test ./... -v -timeout 180s
