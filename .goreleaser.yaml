version: 2

project_name: pgdba-cli

before:
  hooks:
    - go mod tidy -C pgdba-cli

builds:
  - dir: pgdba-cli
    binary: pgdba-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: pgdba-cli
    repository:
      owner: liciomatos
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/liciomatos/pgdba"
    description: "Terminal UI for PostgreSQL DBAs — interactive diagnostics directly in the terminal."
    license: "MIT"
    install: |
      bin.install "pgdba-cli"

scoops:
  - name: pgdba-cli
    repository:
      owner: liciomatos
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    homepage: "https://github.com/liciomatos/pgdba"
    description: "Terminal UI for PostgreSQL DBAs — interactive diagnostics directly in the terminal."
    license: MIT

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other"
      order: 999

release:
  github:
    owner: liciomatos
    name: pgdba
  name_template: "v{{ .Version }}"
